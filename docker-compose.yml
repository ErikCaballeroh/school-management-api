# Stack distribuido para el PIA:
#   - 2 instancias Django (backend1, backend2) corriendo Gunicorn multi-worker
#   - Nginx como reverse proxy + load balancer (least_conn) + failover
#   - Postgres como BD compartida
#   - Redis como cache compartido (escalabilidad de reportes)
#
# Demuestra: distribucion de carga, tolerancia a fallos (Nginx saca instancias
# muertas, Postgres reinicia y Django reabre conexiones), y escalabilidad
# horizontal (agregar backendN al upstream y al compose).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: school
      POSTGRES_USER: school
      POSTGRES_PASSWORD: school
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend1: &backend
    build: .
    environment:
      INSTANCE_ID: backend1
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-key-change-me}
      ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: school
      DB_USER: school
      DB_PASSWORD: school
      DB_HOST: db
      DB_PORT: 5432
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/1
      GUNICORN_WORKERS: "3"
      GUNICORN_THREADS: "2"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend2:
    <<: *backend
    environment:
      INSTANCE_ID: backend2
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-key-change-me}
      ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: school
      DB_USER: school
      DB_PASSWORD: school
      DB_HOST: db
      DB_PORT: 5432
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/1
      GUNICORN_WORKERS: "3"
      GUNICORN_THREADS: "2"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
