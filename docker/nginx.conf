worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Distribucion de peticiones (PIA: load balancer).
    # least_conn manda cada nueva peticion a la instancia con menos conexiones
    # activas — distribuye mejor que round-robin con peticiones de duracion
    # variable (subidas grandes vs reportes rapidos).
    upstream django_backend {
        least_conn;
        # max_fails + fail_timeout = tolerancia a fallos: Nginx saca a la
        # instancia caida del pool tras N fallos y la reintenta despues.
        server backend1:8000 max_fails=3 fail_timeout=15s;
        server backend2:8000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # Logs con request id propagado y backend que sirvio la peticion
    log_format upstream_log '$remote_addr - "$request" '
                            'status=$status bytes=$body_bytes_sent '
                            'rid=$http_x_request_id upstream=$upstream_addr '
                            't=${request_time}s';

    access_log /var/log/nginx/access.log upstream_log;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 35M;  # 30 MB de archivo + headers

    # Genera un X-Request-ID si el cliente no envio uno; se propaga al backend
    # y aparece en los logs de Nginx, Django y la respuesta al cliente.
    map $http_x_request_id $request_id_final {
        default $http_x_request_id;
        ""      $request_id;
    }

    server {
        listen 80;
        server_name _;

        # Liveness directo de Nginx (sin tocar Django)
        location = /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_final;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;

            # Tolerancia a fallos: si una instancia falla / da 502 / da 503,
            # Nginx reintenta la peticion en la siguiente instancia.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
